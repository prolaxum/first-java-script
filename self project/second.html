<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text only when you press enter</title>
</head>
<body>
    <label for="inputBox">Type something here,then press enter:</label>
    <input type="text" id="inputBox">
    <br><br>
    <label for="outputBox">What you wrote:</label>
    <input type="text" id="outputBox" readonly>
    <script src="script.js"></script>
    
</body>
</html>
